<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGReborn Client</title>
    <style>
        :root {
            --bg: #050505;
            --surface: rgba(18, 18, 18, 0.78);
            --border: #222222;
            --text: #e0e0e0;
            --text-muted: #666666;
            --accent: #ffffff;
            --success: #00ff66;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Courier New', Courier, monospace;
            line-height: 1.6;
            overflow-x: hidden;
            position: relative;
            min-height: 100vh;
        }

        /* Фоновое слайдшоу со скриншотами */
        .bg-slideshow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            list-style: none;
        }

        .bg-slideshow li {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0;
            z-index: 0;
            animation: imageFade 24s linear infinite;
            filter: brightness(0.15) blur(3px);
        }

        .bg-slideshow li:nth-child(1) { background-image: url('images/image.png'); animation-delay: 0s; }
        .bg-slideshow li:nth-child(2) { background-image: url('images/image2.png'); animation-delay: 6s; }
        .bg-slideshow li:nth-child(3) { background-image: url('images/image.png'); animation-delay: 12s; }
        .bg-slideshow li:nth-child(4) { background-image: url('images/image2.png'); animation-delay: 18s; }

        @keyframes imageFade {
            0% { opacity: 0; animation-timing-function: ease-in; }
            8% { opacity: 1; }
            25% { opacity: 1; }
            33% { opacity: 0; animation-timing-function: ease-out; }
            100% { opacity: 0; }
        }

        .wrapper {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            padding: 2rem 1rem;
            align-items: center;
        }

        header {
            width: 100%;
            max-width: 700px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1rem;
        }

        .logo-container {
            display: flex;
            align-items: center;
            font-weight: bold;
            font-size: 1.4rem;
            letter-spacing: -1px;
        }

        .cursor {
            display: inline-block;
            width: 10px;
            height: 1.4rem;
            background-color: var(--accent);
            margin-left: 2px;
            animation: blink 0.8s steps(2, start) infinite;
        }

        @keyframes blink {
            to { visibility: hidden; }
        }

        /* Бургер меню */
        .burger-menu {
            cursor: pointer;
            z-index: 100;
            padding: 5px;
        }

        .burger-menu div {
            width: 25px;
            height: 2px;
            background-color: var(--text);
            margin: 5px 0;
            transition: 0.3s;
        }

        .burger-menu.toggle .line1 { transform: rotate(-45deg) translate(-5px, 5px); }
        .burger-menu.toggle .line2 { opacity: 0; }
        .burger-menu.toggle .line3 { transform: rotate(45deg) translate(-5px, -5px); }

        /* Полноэкранный выбор локалей */
        .fullscreen-menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 5, 5, 0.98);
            z-index: 90;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
        }

        .fullscreen-menu.open {
            opacity: 1;
            pointer-events: auto;
        }

        .menu-title {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .lang-list {
            list-style: none;
            text-align: center;
        }

        .lang-list li {
            margin: 1.2rem 0;
        }

        .lang-list button {
            background: none;
            border: none;
            color: var(--text);
            font-family: inherit;
            font-size: 1.4rem;
            cursor: pointer;
            transition: color 0.15s;
            position: relative;
        }

        .lang-list button:hover {
            color: var(--success);
        }

        .lang-list button.active::before {
            content: '>';
            color: var(--success);
            position: absolute;
            left: -25px;
        }

        /* Полупрозрачная центральная плашка */
        .container {
            width: 100%;
            max-width: 700px;
            background: var(--surface);
            border: 1px solid var(--border);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 2.5rem;
            margin-top: 2rem;
            margin-bottom: 2rem;
        }

        .hero {
            margin-bottom: 2.5rem;
        }

        .hero h1 {
            font-size: 1.7rem;
            margin-bottom: 1rem;
            font-weight: normal;
        }

        .hero p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        /* Интеллектуальный блок загрузки */
        .download-box {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
            padding: 1.2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-decoration: none;
            color: inherit;
            transition: border-color 0.15s, background-color 0.15s;
            margin-bottom: 2.5rem;
        }

        .download-box:hover {
            border-color: var(--text-muted);
            background-color: rgba(25, 25, 25, 0.4);
        }

        .download-info {
            display: flex;
            flex-direction: column;
        }

        .dl-title {
            font-size: 0.95rem;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        .dl-sub {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .dl-icon {
            font-size: 1.1rem;
            color: var(--success);
        }

        /* Секция фич и аккордеон */
        .features {
            margin-bottom: 1rem;
        }

        .feature-item {
            border-bottom: 1px solid var(--border);
            padding: 1.2rem 0;
        }

        .feature-title {
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
        }

        .arrow-icon {
            width: 12px;
            height: 12px;
            position: relative;
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .arrow-icon::before, .arrow-icon::after {
            content: '';
            position: absolute;
            background-color: var(--text-muted);
            transition: background-color 0.25s, transform 0.35s;
        }

        .arrow-icon::before {
            top: 5px;
            left: 0;
            width: 12px;
            height: 2px;
        }

        .arrow-icon::after {
            top: 0;
            left: 5px;
            width: 2px;
            height: 12px;
        }

        .feature-item.open .arrow-icon {
            transform: rotate(180deg);
        }

        .feature-item.open .arrow-icon::after {
            transform: rotate(90deg);
            opacity: 0;
        }

        .feature-item:hover .arrow-icon::before, .feature-item:hover .arrow-icon::after {
            background-color: var(--success);
        }

        .feature-desc {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.25, 1, 0.5, 1), margin-top 0.3s;
            color: var(--text-muted);
            font-size: 0.9rem;
            text-align: justify;
        }

        .feature-item.open .feature-desc {
            max-height: 2000px;
            margin-top: 1rem;
        }

        .screenshot-container {
            margin-top: 1.2rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .game-thumb {
            width: 100%;
            height: auto;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: filter 0.2s, transform 0.2s;
        }

        .game-thumb:hover {
            filter: brightness(1.2);
            transform: scale(1.015);
        }

        /* Просмотрщик скриншотов (Лайтбокс) */
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(3, 3, 3, 0.96);
            z-index: 200;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
        }

        .lightbox.open {
            opacity: 1;
            pointer-events: auto;
        }

        .lightbox img {
            max-width: 92%;
            max-height: 92%;
            border: 1px solid #252525;
        }

        /* Подвал */
        footer {
            width: 100%;
            max-width: 700px;
            border-top: 1px solid var(--border);
            padding-top: 1.5rem;
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: lowercase;
            letter-spacing: 1px;
        }

        .collab-link {
            color: var(--text);
            text-decoration: none;
            font-weight: bold;
            transition: color 0.2s, text-shadow 0.2s;
        }

        .collab-link:hover {
            color: var(--accent);
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.6);
        }
    </style>
</head>
<body>

<ul class="bg-slideshow">
    <li></li>
    <li></li>
    <li></li>
    <li></li>
</ul>

<div class="wrapper">
    <header>
        <div class="logo-container">
            <span id="logo-text"></span><span class="cursor"></span>
        </div>
        <div class="burger-menu" onclick="toggleMenu()">
            <div class="line1"></div>
            <div class="line2"></div>
            <div class="line3"></div>
        </div>
    </header>

    <div class="fullscreen-menu" id="fs-menu">
        <div class="menu-title" data-i18n="select-lang">Select Language</div>
        <ul class="lang-list">
            <li><button id="btn-en" onclick="changeLang('en')">English</button></li>
            <li><button id="btn-ru" onclick="changeLang('ru')">Русский</button></li>
            <li><button id="btn-ua" onclick="changeLang('ua')">Українська</button></li>
            <li><button id="btn-by" onclick="changeLang('by')">Беларуская</button></li>
            <li><button id="btn-kz" onclick="changeLang('kz')">Қазақша</button></li>
        </ul>
    </div>

    <main class="container">
        <section class="hero">
            <h1 data-i18n="hero-title">Loading...</h1>
            <p data-i18n="hero-desc">Loading...</p>
        </section>

        <a href="https://github.com/alekstwin63/AGReborn/releases" id="dl-link" target="_blank" class="download-box">
            <div class="download-info">
                <span class="dl-title" id="dl-main-text">FETCHING LATEST RELEASE...</span>
                <span class="dl-sub" id="dl-sub-text">github.com/alekstwin63/AGReborn/releases</span>
            </div>
            <span class="dl-icon" id="dl-icon-symbol">↘</span>
        </a>

        <section class="features">
            <div class="feature-item">
                <div class="feature-title" onclick="toggleFeature(this)">
                    <span data-i18n="f1-title">Loading...</span>
                    <div class="arrow-icon"></div>
                </div>
                <div class="feature-desc">
                    <p data-i18n="f1-desc">Loading...</p>
                    <div class="screenshot-container">
                        <img src="images/image.png" class="game-thumb" onclick="openLightbox(this.src)" alt="AGReborn Gameplay 1">
                        <img src="images/image2.png" class="game-thumb" onclick="openLightbox(this.src)" alt="AGReborn Gameplay 2">
                    </div>
                </div>
            </div>

            <div class="feature-item">
                <div class="feature-title" onclick="toggleFeature(this)">
                    <span data-i18n="f2-title">Loading...</span>
                    <div class="arrow-icon"></div>
                </div>
                <div class="feature-desc">
                    <p data-i18n="f2-desc">Loading...</p>
                    <div class="screenshot-container">
                        <img src="images/image2.png" class="game-thumb" onclick="openLightbox(this.src)" alt="AGReborn Config">
                        <img src="images/image.png" class="game-thumb" onclick="openLightbox(this.src)" alt="AGReborn Match">
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        made by <a href="https://nlpacollab.neocities.org/" target="_blank" class="collab-link">nlpa collab</a> for half-life players
    </footer>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <img id="lightbox-img" src="" alt="Enlarged screenshot">
</div>

    let currentLang = localStorage.getItem('ag_lang') || 'en';
    let latestVersionTag = ""; 

    function updateDOM() {
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            if (i18n[currentLang][key]) {
                el.innerText = i18n[currentLang][key];
            }
        });

        // Умное обновление текста на кнопке скачивания
        const mainDlText = document.getElementById('dl-main-text');
        if (latestVersionTag) {
            mainDlText.innerText = `${i18n[currentLang]['dl-success']} (${latestVersionTag})`;
        } else {
            mainDlText.innerText = i18n[currentLang]['dl-loading'];
        }

        ['en', 'ru', 'ua', 'by', 'kz'].forEach(l => {
            document.getElementById(`btn-${l}`).classList.toggle('active', currentLang === l);
        });
    }

    function changeLang(lang) {
        currentLang = lang;
        localStorage.setItem('ag_lang', lang);
        updateDOM();
        toggleMenu();
    }

    function toggleMenu() {
        document.querySelector('.burger-menu').classList.toggle('toggle');
        document.getElementById('fs-menu').classList.toggle('open');
    }

    function toggleFeature(element) {
        const item = element.parentElement;
        item.classList.toggle('open');
    }

    function openLightbox(src) {
        const lb = document.getElementById('lightbox');
        document.getElementById('lightbox-img').src = src;
        lb.classList.add('open');
    }

    function closeLightbox() {
        document.getElementById('lightbox').classList.remove('open');
    }

    function runTypewriter() {
        const text = "AGReborn_";
        const speed = 60; 
        let i = 0;
        const target = document.getElementById('logo-text');
        target.innerText = "";
        
        function type() {
            if (i < text.length) {
                target.innerText += text.charAt(i);
                i++;
                setTimeout(type, speed);
            }
        }
        type();
    }

    // Динамический перехват последнего релиза через GitHub API
    async function initLatestReleaseLink() {
        const repo = "alekstwin63/AGReborn";
        const url = `https://api.github.com/repos/${repo}/releases/latest`;
        
        try {
            const response = await fetch(url);
            if (!response.ok) throw new Error('API limit or repo not found');
            const data = await response.json();
            
            if (data.assets && data.assets.length > 0) {
                // Извлекаем прямую ссылку на первый скомпилированный ассет (.zip, .rar или .exe)
                const downloadUrl = data.assets[0].browser_download_url;
                latestVersionTag = data.tag_name; // Например "v1.2.4"
                
                const linkElement = document.getElementById('dl-link');
                linkElement.href = downloadUrl;
                
                // Меняем иконку на классический символ загрузки
                document.getElementById('dl-icon-symbol').innerText = "↓";
                document.getElementById('dl-sub-text').innerText = data.assets[0].name;
            } else {
                // Если ассетов нет, кидаем на исходный код релиза
                latestVersionTag = data.tag_name;
                document.getElementById('dl-link').href = data.zipball_url;
            }
        } catch (error) {
            console.warn("GitHub API fetch failed. Using fallback link to releases tab.", error);
            // Фолбэк: если гитхаб лежит, оставляем стандартный текст и ссылку на вкладку релизов
            latestVersionTag = "REL";
        }
        
        updateDOM();
    }

    document.addEventListener('DOMContentLoaded', () => {
        updateDOM();
        runTypewriter();
        initLatestReleaseLink();
    });
</script>
